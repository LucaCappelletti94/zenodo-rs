name: Stability Weekly

on:
  schedule:
    - cron: "29 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stability-weekly
  cancel-in-progress: false

jobs:
  sandbox-heavy:
    name: Sandbox Heavy Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: zenodo-sandbox
    env:
      RUST_BACKTRACE: "1"
      ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate sandbox configuration
        shell: bash
        run: |
          test -n "$ZENODO_SANDBOX_TOKEN" || { echo "Missing ZENODO_SANDBOX_TOKEN secret"; exit 1; }

      - name: Run heavy sandbox smoke suite
        run: cargo test --test sandbox_heavy --all-features --locked -- --ignored --nocapture --test-threads=1
